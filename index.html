<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Registration Form</h2>
        
        <!-- Form tag ki jagah simple div use kiya hai taaki 405 error ki tension khatam ho jaye -->
        <div class="registration-form">
            
            <!-- Full Name Field -->
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email address">
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <!-- Gender Radio Options -->
            <div class="radio-group-container">
                <p>Gender</p>
                <div class="radio-options">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male"> Male
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="female"> Female
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="other"> Other
                    </label>
                </div>
            </div>

            <!-- Course Selection -->
            <div class="form-group">
                <label for="interest">Course / Interest</label>
                <select id="interest">
                    <option value="" disabled selected>Select your interest</option>
                    <option value="frontend">Frontend Development</option>
                    <option value="backend">Backend Development</option>
                    <option value="uiux">UI/UX Design</option>
                </select>
            </div>

            <!-- Submit Button with simple Alert -->
            <button type="button" class="btn-submit" onclick="alert('Registration Successful! (UI Demo)')">Submit</button>

        </div>
    </div>

</body>
</html>
